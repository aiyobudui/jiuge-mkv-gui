<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Film reel left -->
  <g transform="translate(80, 120)">
    <circle cx="80" cy="136" r="100" fill="none" stroke="url(#iconGrad)" stroke-width="16" opacity="0.9"/>
    <circle cx="80" cy="136" r="30" fill="url(#iconGrad)" opacity="0.9"/>
    <circle cx="80" cy="56" r="16" fill="url(#iconGrad)" opacity="0.7"/>
    <circle cx="80" cy="216" r="16" fill="url(#iconGrad)" opacity="0.7"/>
    <circle cx="20" cy="96" r="16" fill="url(#iconGrad)" opacity="0.7"/>
    <circle cx="140" cy="96" r="16" fill="url(#iconGrad)" opacity="0.7"/>
    <circle cx="20" cy="176" r="16" fill="url(#iconGrad)" opacity="0.7"/>
    <circle cx="140" cy="176" r="16" fill="url(#iconGrad)" opacity="0.7"/>
  </g>
  
  <!-- Merge arrow -->
  <g transform="translate(200, 180)">
    <path d="M0,40 L60,40 L60,10 L100,56 L60,102 L60,72 L0,72 Z" fill="url(#iconGrad)" opacity="0.95"/>
  </g>
  
  <!-- MKV file right -->
  <g transform="translate(300, 140)">
    <rect x="0" y="0" width="120" height="160" rx="16" fill="url(#iconGrad)" opacity="0.95"/>
    <rect x="16" y="16" width="88" height="64" rx="8" fill="#667eea"/>
    <!-- Play triangle -->
    <polygon points="48,32 48,64 76,48" fill="#ffffff"/>
    <!-- MKV label -->
    <text x="60" y="120" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#667eea" text-anchor="middle">MKV</text>
    <text x="60" y="148" font-family="Arial, sans-serif" font-size="14" fill="#764ba2" text-anchor="middle">九歌</text>
  </g>
</svg>