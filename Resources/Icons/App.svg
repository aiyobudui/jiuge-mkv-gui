<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#00bcf2"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" stroke="#0078d4" stroke-width="4"/>
  
  <!-- Film strip left -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="80" height="136" rx="8" fill="url(#filmGrad)" opacity="0.9"/>
    <!-- Film holes -->
    <rect x="8" y="12" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="8" y="42" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="8" y="72" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="8" y="102" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="60" y="12" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="60" y="42" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="60" y="72" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <rect x="60" y="102" width="12" height="18" rx="3" fill="#1a1a2e"/>
    <!-- Video frame area -->
    <rect x="24" y="20" width="32" height="96" rx="4" fill="#1a1a2e"/>
    <!-- Play symbol -->
    <polygon points="36,55 36,85 56,70" fill="#0078d4"/>
  </g>
  
  <!-- Merge arrows -->
  <g transform="translate(115, 80)">
    <!-- Arrow 1 -->
    <path d="M0,30 L30,30 L30,15 L50,35 L30,55 L30,40 L0,40 Z" fill="url(#arrowGrad)" opacity="0.9"/>
    <!-- Arrow 2 -->
    <path d="M0,70 L30,70 L30,55 L50,75 L30,95 L30,80 L0,80 Z" fill="url(#arrowGrad)" opacity="0.9"/>
  </g>
  
  <!-- Output MKV file -->
  <g transform="translate(155, 60)">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#0078d4" stroke="#00bcf2" stroke-width="2"/>
    <rect x="8" y="8" width="54" height="50" rx="4" fill="#1a1a2e"/>
    <!-- MKV text -->
    <text x="35" y="78" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">MKV</text>
    <!-- Check mark -->
    <path d="M20,30 L30,42 L52,20" stroke="#00ff88" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Subtitle track indicator -->
  <g transform="translate(155, 155)">
    <rect x="0" y="0" width="70" height="40" rx="4" fill="#2d5a27" stroke="#4caf50" stroke-width="1"/>
    <text x="35" y="26" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">字幕</text>
  </g>
  
  <!-- Audio track indicator -->
  <g transform="translate(155, 200)">
    <rect x="0" y="0" width="70" height="40" rx="4" fill="#5a2727" stroke="#f44336" stroke-width="1"/>
    <text x="35" y="26" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">音轨</text>
  </g>
</svg>